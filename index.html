<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shared GIS App</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="container">
  <div id="sidebar">
    <h2>Imported Layers</h2>
    <input type="file" id="file-input" accept=".shp,.zip,.kmz,.kml" />
    <ul id="layer-list"></ul>
    <button id="save-all">Save All to Database</button>
  </div>

  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/shpjs/dist/shp.min.js"></script>
<script src="https://unpkg.com/togeojson"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.0/jszip.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="app.js"></script>
</body>
</html>
