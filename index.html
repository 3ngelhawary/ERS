<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GIS Pro Shared DB</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <button id="sidebarReopenBtn" class="sidebar-reopen-btn" type="button">☰</button>

  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="brand-block">
          <div class="brand-icon">GIS</div>
          <div class="brand-text">
            <h1>GIS Pro Shared DB</h1>
            <p>Real-time layers, edit lock, attribute table</p>
          </div>
        </div>
        <button class="collapse-btn" id="toggleSidebar" type="button">☰</button>
      </div>

      <section class="panel">
        <h2>User</h2>
        <div class="grid">
          <input id="userName" type="text" placeholder="User name (required for save/edit lock)" />
          <input id="adminCode" type="password" placeholder="Admin code" />
          <input id="datasetCategory" type="text" placeholder="Layer category" />
        </div>
      </section>

      <section class="panel">
        <h2>Map</h2>
        <div class="grid">
          <select id="basemapSelect">
            <option value="street">Street</option>
            <option value="satellite">Satellite</option>
          </select>
          <select id="visibilityFilter">
            <option value="all">Show All Layers</option>
            <option value="visible">Visible Only</option>
            <option value="hidden">Hidden Only</option>
          </select>
        </div>
      </section>

      <section class="panel">
        <h2>Import</h2>
        <div id="dropZone" class="upload-box">Drag &amp; Drop File Here</div>
        <input id="fileInput" type="file" accept=".kmz,.kml,.zip,.shp,.dbf,.shx,.prj,.cpg" multiple hidden />

        <div class="grid import-grid">
          <input id="datasetTitle" type="text" placeholder="Layer title" />
          <textarea id="datasetNotes" rows="2" placeholder="Notes"></textarea>
        </div>

        <div class="toolbar">
          <button id="saveSelectedBtn" class="btn primary" type="button">Save Selected</button>
          <button id="refreshDbBtn" class="btn dark" type="button">Sync</button>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Layers</h2>
          <span id="dbCountBadge" class="badge">0</span>
        </div>

        <input id="searchBox" class="search-box" type="text" placeholder="Search title, category, owner" />
        <div id="layerList" class="layer-list"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Attribute Table</h2>
          <button id="clearSelectionBtn" class="mini-btn" type="button">Clear</button>
        </div>
        <div id="attributeSummary" class="attribute-summary">No feature selected</div>
        <div id="attributeTableWrap" class="attribute-table-wrap">
          <table id="attributeTable" class="attribute-table">
            <thead>
              <tr>
                <th style="width: 40%">Field</th>
                <th style="width: 60%">Value</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section class="panel panel-small">
        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-title">Saved Layers</div>
            <div id="savedLayerCount" class="stat-value">0</div>
          </div>
          <div class="stat-box">
            <div class="stat-title">Unsaved Layers</div>
            <div id="unsavedLayerCount" class="stat-value">0</div>
          </div>
          <div class="stat-box">
            <div class="stat-title">Visible Layers</div>
            <div id="visibleLayerCount" class="stat-value">0</div>
          </div>
          <div class="stat-box">
            <div class="stat-title">Locked Layers</div>
            <div id="lockedLayerCount" class="stat-value">0</div>
          </div>
        </div>
      </section>

      <section class="panel signature-panel">
        <div class="signature">Developed By A. ElHawary</div>
      </section>
    </aside>

    <main class="map-wrap">
      <div class="topbar">
        <div class="topbar-left">
          <span class="status-dot"></span>
          <span id="statusText">Ready</span>
        </div>

        <div class="topbar-right">
          <button id="zoomAllBtn" class="btn dark" type="button">Zoom All</button>
          <button id="clearUnsavedBtn" class="btn danger" type="button">Clear Unsaved</button>
        </div>
      </div>

      <div id="map"></div>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
  <script src="https://unpkg.com/shpjs@latest/dist/shp.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://unpkg.com/@tmcw/togeojson@5.8.1/dist/togeojson.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="./app.config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
